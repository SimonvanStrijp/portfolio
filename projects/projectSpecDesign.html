    <h1>Lamentations of the mind</h1>
<p>In dit project ben ik druk aan de slag gegaan met een speculatief ontwerp rondom het thema "the meta verse"</p>
<p>De centrale vraag die ik wou ontleden luide "kunnen wij nog waardevolle menselijke interacties hebben in een digitale wereld." </p>
<p>Hiervoor heb ik een toekomstige versie van de aarde ontworpen waarbij mensen het digitale leven anbidden. De civalisatie is gebaseerd op het oude mesopotamië in hun gebruiken, ontwerp en rituelen. Echter er zit een grote laag speculatieve fictie overheen.</p>
<h3>
  De worldbuilding uitgewerkt in het kort.
</h3>
<img src="/../img/specdesign/worldbuilding.jpg" alt="">
<p>Bij ieder figuur in deze wereld heb ik een stukje van wat ik zie als menselijkheid weg genomen, om zo een exploratie van onszelf te maken.</p>
