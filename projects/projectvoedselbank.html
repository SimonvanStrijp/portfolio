  <section>
    <p>
      Tijdens mijn afstudeer periode heb ik, in samenwerking met de voedselbank, een installatie ontworpen.
      De voedselbank in Maastricht onderging een belangrijke ontwikkeling. Het nieuwe winkel concept, wat langzaam door het gehele land gebruikt wordt, werd ook hier in Maastricht geintroduceert. Hierbij kunnen de consumenten zelf winkelen voor hun voedselpaketten. Echter, de voedselbank kan slechts 200 huishouden in Maastricht helpen. Dit project probeert de middele van de voedselbank te bevorderen door drie stakeholders aan te spreken.
    </p>
    <ul>
      <li><p>potentiele (voedsel) donateurs</p></li>
      <li><p>potentiele Vrijwilligers</p></li>
      <li><p>De gemeente Maastricht</p></li>


    </ul>
    <img src="../img/afstudeerproject/HighresScreenshot01.png" alt="">
    <p></p>
    
    <div class="grid-50">
      <div>
        <p>Eén van de belangrijkste ontdekkingen van dit project waren de drie kernwaarde van het nieuwe concept van de voedselbank. Deze ontdekking heeft mij instaat gebracht mijn uiteindelijke ontwerp vorm te geven
    </p>
    <ul>
      <li><h3>Autonomie</h3>
        <p>De vrijheid om zelf rond te lopen in de winkel.</p>
      </li>
      <li><h3>Keuzenvrijheid</h3>
        <p>De mogelijkheid om zelf de producten uit te kunnen kiezen op smaak, dieet wensen, allergien en geloofsovertuiging.</p>
      </li>
      <li><h3>Sociaale connectie</h3>
        <p>Heet ontmoeten van anderen en het mogelijk versterken van het vangnet.</p>
      </li>
    </ul>

<img src="../img/afstudeerproject/HighresScreenshot04.png" alt="">    <h3>Het uitiendelijke ontwerp</h3>
    <p>Als ontwerp heb ik een digitaal prototype gemaakt van een installatie bedoeld voor de publieke ruimte. Deze installatie simuleert de ervaring voor de consumenten van de voedselbank voor het brede publiek. Daarnaast wordt deze in de publieke ruimte geplaats om het stigma rondom voedselhulp bespreekbaar te maken.</p>
    <p>de informatie en het verhaal zijn te vinden op verschillende producten die rond de schappen zijn verspreid. Daarnaast zijn er informatie borden die de kern van het verhaal communiceren.</p>
