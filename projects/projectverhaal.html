<section>
  <h3>Prologue</h3>
  <p>A small ferry made of wood made its way through a lake. Its silhouette was lit up by an old metal lantern hanging from the front bow. The ferry was simple yet ornate. Comforting, yet bone chilling. Upon it, stood a deathly figure. Who found its way towards a small dock. 
As it stood there, on the edge of the dock, a woman approached. She seemed panicked. She was clothed in a thick woollen dress. A rough apron bound around her waist and her hair neatly tucked away in a small headdress. 
“Thee should not be afraid. It is true, thine time has come. My ferry awaits thee.” Death seemed to speak in some ancient tongue. “For a piece of gold, I will bring thee towards the beyond.” She replied in a panic. “I do not have a piece of gold, It was taken from me, all of it!” Death stayed silent, as the cold of this realm crept through her bones. “Not to worry” It spoke, “As the toll, I ask a favour of thee. When thee reaches the beyond, whilst thou deliver this letter, it is for an old friend of mine” 
Death paused again, seeming to take delight in her confusion. “Cometh now, step onto my ferry and let me tell thee the tale of my friend. My apologies if I forget any details, it has been quite a few years.” </p>
<h3>Awakening</h3>
<p>A cold crept over him as his eyes became heavy. The shaking in his right hand slowly came to a crawl. The high pitched ringing that had been in his ear for the past decades lowered in tone, it became a deep bassy humm. Dragging him along from dream to dream. He saw a farm, a town house. His wife. He saw an end, a beginning. New life and a helping hand. He saw a blur of Makarios flash before him. Trees wither in winter. Leaves falling from their branches in preparation for the end.
</p>
<p>Waking from this dream was not the same as usual. His senses were strange to him. Colours were not as he remembered, and his body felt not as it used to. The tremors, aches and itches were gone. But his fingers felt every single grain in the soil. His eyes gazed upon the gloomy sky that loomed so far above his head. The branches of the twisted trees curled in between the clouds. Rays of coloured light broke through the cloudy sky as if a great work of stained glass was shattered and thrown through the sky. A thick layer of fog crawled between the gnarled roots. The foggy air was filled with the moist scent of autumn leaves. Solvitus sat on the edge of a great lake. The soles of his sandals touched the cold, moist soil as he lifted himself to his feet. It was a strange sensation to stand without his bones creaking and screaming out at him. There was a simple peace in his body. As he clasped his chest, he barely felt his own hand up against his heart. Barely registered his white tunic brushing up against his body. It was like all scenes were muted. 
</p>
<p>Peering across the lake Solvitus saw a great amount of scattered islands. floating across the lake, they were dotted by ruins and nature alike. Many of these islands swirled around and slowly deformed. The unease hung both in the sky and seeped from the floor. It all felt like a bad dream.
</p>
<p>Solvitus squinted his eyes as he heard a voice carried by the wind. The words were hard to make out. But they called him forward. The wrinkles on his old skin folded around his brow as he tried to adjust his eyes to the world around him. His vision was caught on the wooden planks of a rickety dock. His vision crawled past the planks towards the voice.
</p>
<p>He shuddered as the cold crept across his spine. For there, on the edge of the dock, there stood a figure. One wreathed in a cloak of frost and night. Solvitus' eyes followed the silhouette. from its flowy robes up to its waste. And there, on its belt hung an ornate hourglass, slowly ticking away. It was still half full. Death came to early. The chest of this figure was hollow and heartless.   As his gaze crawled over the figure, Solvitus became more restless, as soon, he would have meet its gaze. but no matter how much he wanted to avert his eyes, something in him was compelled to continue. It could have been the being's voice, as much as it could have been his own. Its head was obscured by a dark hood and wreathed by moonlight. Out from under the hood, two shining white eyes peered at Solvitus.
</p>
<p>
  Something broke in him as soon as his eyes met the wintery gaze. His mind was no longer his own. Anger, hatred, sadness, loss, grief, mallace. His mind was in a vortex of chaos as he looked upon the deathly figure.

</p>
<p>
And it spoke. "Solvitus, thy time in the realm of life has come to an end. Come now and step forward, for the ferry awaits thy presence." The raspy voice tore through the frigid air. Solvitus wanted to stay on the shore, wanted to just sit down on this island. somewhere between life and death. Clamp down for all of eternity, just sit here and watch the islands shift and reform. But he had to enter the boat, he needed to find Makarios. As death beckoned, it stretched its crooked arm out towards the ferry.
Solvitus passed the looming figure on his way to the boat. Feeling the icy stare burn into the back of his head. He stretched one leg out from the dock and as passed the edge of the boat, he noticed that death was no longer behind him. insead, it stood at the back of it. Oar in one hand, the other stretched out towards him. "Thy art required to pay the toll towards the realm beyond. One coin of gold per soul." 
</p>
<p>Solvitus ignored the figure's voice, as his gaze was drawn away. The ferry was mostly empty, in the front was just one single woman. She was young, her blonde hair was illuminated by the vile light emitted by the lantern hanging from the front of the boat. She was cradling something in her arms. Something small. Intrigued, Solvitus walked up to her, wanting to take a seat on the bench next to her. He was curious about her life, about her death. But mostly, it was a selfish reason. He wanted to leave as much boat between himself and the monster. As his feet lifted off from the deck, the voice spoke once more. "The seat thou wish to occupy has been reserved. Thy will stand beside me, until the required toll has been resolved."
Before he walked back towards death, he peered over the woman's shoulder. The thing she was cradling was a stillborn. "How?!" Solvitus' scream echoed across the lake. "How could you take them? You are a monster!" Death stood in contemplating silence before answering calmly. Its demeanour was strong, assertive but warm. "Thy would call me monster? One of thine past? The services of mine are not for thou to comprehend". Solvitus scoffed, under his muttered breath he whispered "at least you did not rip the child from her arms.
</p>
<h3>
   The Lake 

</h3>
<p>


Solvitus stood next to death in the rickety boat. The waters of the lake were barely disturbed as the boat passed over the small wrinkles and waves. The silhouette of an island doomed from within the mist. It was a large hill, with a ruined castle slanted on top of it. 
</p>
<p>
Death gripped the oar tighter as he steered the boat towards the small dock. Death took to the land, with strides of wind and mist. Solvitus saw how the figure of death looked at the hourglass on his belt. Time passed by as the wind. Finally the heavy gate creaked open. Through it, a man strode towards the dock, towards death. A thick, well groomed beard on his face. He wore a golden suit of armour with a skirt of leather tassels covering his upper legs. On his belt was a fine sword, inlaid with gold and script, and his brow supported a crown of gold and gem. He seemed like a proud man, but at this moment he cowered toward the dock. Solvitus recognised the look in the eyes of this man. For he himself had felt the same whilst walking up to the dock. For there upon the dock, weather in the mist, there stood a figure of monolithic size. Its form was dark and obscured by mist. An armour as black as midnight, gleaming like a star covered its entire body. A Cloak of blackened fog obscured where the figure ended and the night began. His head carried a crown glowing in the fog. The small white eyes seemed to loom over the king from atop a mountain. The king, mighty in life, his words the law, now cowered before death. Who looked down on the mortal man and spoke with a voice of darkness, booming and loud and commanding.
""Aristarchus , thou haveth made the realm of life your own. But it is no more, a kingdom in ruin, as its people were under thy rule. Thine time has ended. Come forth, for the ferry of mine awaits thy presence."
</p>
  
<p>
The king stepped into the boat, fear filled his eyes, Solvitus tried to meet his gaze, but the king just stared at the floor. His fists balled up, his knuckles white as snow, the Tyrant tried to make his way towards a bench. He reeled back as the form of death stood in his way, blocking him from sitting down. "Aristarchus , thy art required to pay the toll towards the realm beyond. One coin of gold per soul." There was a hesitation in his eyes. But eventually he reached into his pocket and took out a coin of solid gold. Death looked upon him with a stretched out hand. Aristarchus  hesitated once more, he clung onto the coin as if it could bring his empire back. Slowly he opened his hand, with a look of disgust on his face the golden coin disappeared between the boney clutch of death. Solvitus could only feel bad for this man. He had known his name in life, the king of a kingdom just beyond the horizon. A true tyrant. But he was a mortal man, just like Solvitus himself. The true tyrant strode between them. It moved back towards the rear end of the boat, reaching out for the oar.
The waters of the lake were as still as they were frigid. The shroud of mist that covered it, slowly broke as the ferry of death passed through it. Time, and its passing, was difficult to notice, for there was no sun, no moon, not even a cloak of night to grasp around the skies. Bored was not the proper descriptor. Solvitus felt without purpose, empty. peering out over the lake, his gaze fell on a small island. Had it not been for the silhouettes on the shoreline, the island should not have been anything special. They seemed to be human in figure, floating a little above the ground.
"Those whom have to stay behind" Death's raspy voice broke the silence. "Have to stay behind?" "Some mortals can not pass on. In their last moments, they were not able to accept death. Now, they play a part in the dreams of others, hoping to find their answers". Solvitus stayed silent for a moment. Biting down on his lower lip. His fists were balled up, pale skin stretched over his knuckles. A roaring pain built up in his chest. "YOU! you could have helped her, you could have helped them both! But you chose not to!" The words left the threshold of his lips before his mind could register. Cold sweat broke out over his face. His spine tingling and on fire. Shakingly, he looked up at the figure of death. Solvitus’ mouth was dry as he tried to speak "I.... I am sorry...". His voice trembled. Death merely looked at Solvitus. Its eyes sparkling with white light. "Some of thee, can not find salvation."
Death gripped the oar and steered towards a dock a little beyond the lost spirits. As he docked his ferry, death's form shrunk into a small, frail old man as he rose from the boat. Feathers as deep as night formed a collar around his shoulders. The oar, morphing and reforming to crooked spear, with a small lantern attached just below the tip, illuminating the thick layers of fog. The fog broke as death spoke "Come...". And as he spoke, a woman strode forward, wielding a large sword of steel on her hip. Her broad shoulders were covered by the fur of a large predator. Red hair was braided back and a leather band held the rough, loose strands out of her face.
She stood head and shoulders above the figure on the dock. But soon took a knee, holding up a pouch of golden coins. "Aslaug, Thine time upon the world of life has cometh to an end. A warrior of valour thee art. Many boats I haveth fared across this lake." "I have fought, slain and claimed honour in my lifetime. I have amassed wealth to pay for my final journey. My last question, was my death worthy?" "Does thou not remember thine death?". A silence hung across the lake, the woman's face in disbelief. "Thine life has ended as thou wast already within my realm of dreams. A cut-throat managed to reach thee when most vulnerable."
Coins rolled across the floor as the head of the barbaric woman hung in silent disbelief. Death wrapped his arm around her defeated shoulders and helped towards the boat. "Where... where will you take me?" "The gate is the end of the journey of thee. Further, I cannot take thee. Thee should maketh sure to have peace with thine death before the end."
The planks from the boat creaked as it glided through the lake. Small rocks jutted out from the still waters, death steering the ferry carefully around these rocks. Solvitus’ thoughts drifted around once more, Makarios’ flashed across his thoughts. Makarios’ hands reached for those of his friend. Trying to pull each other up upon the rocks. Solvitus could not help but smile a bit, although this smile was soon replaced by an aching pain within his chest, a gaping pit within his mind and a loss within his heart. He desperately tried, but to no avail. Struggling against the realm of death. 
The rocks around the boat shifted, first they took the form of small islands. Solvitus saw Makarios playing with his mother. He saw himself working the field together with Makarios, his own son. Soon, the rocks shifted. Panic gripping Solvitus’ chest, clawing at him, gripping his throat. The rocks morphed to rectangular shapes, carvings appearing in the tombstones that rose from the water. Crooked and twisting they rose, higher above him. Dooming monoliths of stone and loss loomed over his head. The eyes of Solvitus, burning with pain and tears. All until a bony hand gripped his shoulder. Death spoke, in soothing, but raspy voice, “The realm of dreams may have a particularly strong effect on thine wandering mind.” 

</p>
<p>A soft whistle filled the air. Solvitus, still reeling, tried to focus on this whistle. Trying to calm his screaming mind he peered into the mist. There, he saw another island, looking at the dock, he saw a man sitting on the edge. Behind him, Solvitus felt death move, a confused look was hidden by the black hood. “Death! You are late!” A jovial man sat on the planks, his legs swinging above the water. He must have been a decade or two younger than Solvitus. “What took you so long?” “Solon, why art thou so eager to join my ferry?” “I am ready, I have lived a long life. I have achieved all I wanted. I am happy, but tired.” He tossed a coin of gold towards the figure of death, who in turn had to shift quickly to catch it. Before Solvitus knew, the man already sat on a bench in the boat. He had taken up a seat right next to the still sobbing Aslaug. 
</p>
<p>Solvitus whispered a muttered breath “How can someone just throw the rest of their life away like this.” As he thought about his son, how he was taken. His gaze fell to the man, anger, jealousy stirred in his heart. “You know, I was a teacher once” The man spoke once more. “I have adventured in the jungles and climbed the highest mountains, none of you could imagine the sights I have seen. But, nothing beats bringing joy to those faces as you share your own experiences”. Solon leaned against the side of the boat. Gazing off into the distance. Death’s eerie voice spoke out. “Life and experiences art synonym. However that does not mean it ends in death.” 
</p>
<p>Solvitus’gaze fell over the deathly figure at the back of the boat. Who in turn looked at him. Its gleaming eyes seemed to invite Solvitus, challenge him in some way. But it did not speak. Solvitus could not decipher its meaning, what did it want from him? His mind raced, looking for answers. He averted his eyes, insead choosing to stare at the flame of the lantern. It was calming, hypnotising even. His mind took him away from Death, and back to his past, back to regret and shame. 
</p>
<p>While staring at the lantern, Solvitus exhaled and gasped for air. He hadn’t noticed that he was holding his breath in anticipation. Staring with glazed over eyes, Solvitus saw another island looming through the fog, just beyond the pale light of the boat’s lantern. On the shore of the island was a small farm hut. It had low walls, made from a variety of rough fieldstones. The thatch roof was as ruffled as the fur coat of an elderly dog. In some shape or form, it resembled his own home. As the front door swung open with a wide arch, a woman stormed out of the house. Her hair was dark and wavy, and slowly being enveloped by the fog. Her form was vague and fluid, but all too clear to Solvitus  A large burlap sack was flung over her shoulder. Solvitus knew exactly what it was filled with, as he himself had packed it for her after the fight. Weeping, she moved past the tombstone in front of the small farm. He had never seen her again, not after he had kicked her out of their home. How could she? After what had happened to Makarios, she just let go of him, wanting to move on, wanting an other child. As if his death meant nothing to her. Solvitus felt a rage flow through his stomach, as he looked upon his former wife. How could she not love their son like he dit? His mind kept repeating the same words in a loop, just ‘why’, ‘why’, ‘why’ echoing through his skull. 
</p>
<p>Solvitus snapped out of it as the boat bounced off of the rickety dock. He saw death stepping out of the boat from the corner of his eye. His legs were aching with a will to move, to run towards his old home. His muscles burning with passion, excitement and adrenaline. Before he knew, they jumped onto the dock, the wooden planks creaking under his weight. He ran past the silhouette of death, its cloak flowing with the movements of his feet. As Solvitus moved closer and closer to his past, the memories came flooding back. Of the sickness, the sorrow, holding his son's hand. His brittle, trembling fingers were cold to the touch. Solvitus’ feet ran towards the old farm, his head felt like it was being dragged along. As the silhouette of a woman came into his blurry vision, he almost fell over as his feet stopped moving. His throat clamped up, as if death wrapped his hands around it. Yet, Death was still behind him on the edge of the dock. Solvitus’ vision sharpened, focussed on the woman. An old crooked woman appeared from the silhouette. Her eyes were sad, tired but sweet and loving. Solvitus saw the fear they tried to mask. She leaned on a small twisted stick. Solvitus’ own eyes teared up, looking at this elderly woman, barely keeping herself upright on her stick.
</p>

<p>The deathly voice spoke softly through the winds, Its whisper moved through the air, dancing with a macabre grace as the woman moved closer. "Zenna, thine legacy is strong and full of life. The children of thine mourn thee as we speak. However tragic their loss be, thine time has ended. Come forth now, for my ferry awaits thine warmth."
</p>

<p>Solvitus collapsed to his knees, looking onward to the small farm. His eyes stung with a red burning pain, barely soothed by the water gathering on his lower eyelid. He heard muffled voices carried by the wind, waves crashing into the shore and the creaking of the wooden boat. Death helped Zenna into the ferry, holding her with one hand as she stumbled towards her seat, while cradling her walking stick in the other. She looked at the deathly figure and whispered to it, in a loving but pleading tone. “Please be careful with it. My youngest grandson found this very stick in the forest one day. My son sanded it and waxed it so it would be comfortable in my hand.” Death bowed down to face the woman, and spoke softly. “Worry not, for thy have imbued the spawn of thine with wisdom and experience. One day I might carry them onwards upon my ferry, but that day is far from now.” Death straightened up, ready to call for Solvitus, who was, to the surprise of the ferryman, already on his way to the boat. Death stretched out its gaunt hand, as Solvitus crossed the threshold of the rickety dock. It’s small twinkling eyes trying to meet his, but to no avail. The bitter man moved past death, accidentally brushing its cloak with his shoulder. 
</p>

<p>While silently carving its way through the lake, the little ferry was filled with a form of dread. Fearing what awaited them beyond the gates. Aslaug was nervously ticking her vingers on the hilt of her weapon. Rocking her foot up and down, periodically tapping the wooden floorboards with the heel of her boot. “Worthy?” The word barely left her lips. Solvitus did not heed her worries, his own words were bottled up deep within his throat, wanting to come out. He was afraid to release them, afraid to once again let his anger, his hatred, flow. Death stood silently on the back of the ferry,  oar in hand. Its small eyes locked into the gaze of Solvitus. As if it knew what he was thinking, Death spoke “ask”. 
“Perdita, how… how is she?” “Does thy truly want to know? For I shall not lie to thee Solvitus.” He nodded hesitantly. “After thee banished her from thine home, she struggled to find her new life. Eventually meeting a man, but she never bore another child". "Are you sure?” “Perdita told me upon this very ferry, before passing through the gates.” “Is she with Makarios?” Solvitus’ voice raised in a mix of panic, excitement and hope. “That, I cannot say.” Death’s eyes glittered more than usual. The tiny black beads lit up with a soft white, shiny glow from within the dark, black hood. 
</p>
<p>On their left was a small island. The ruins of some form of courthouse stood proudly upon the dark hill. Vines and trees crawling around the ruin, hugging it’s bricks and holding the structure together. In it, Solvitus saw a man, franticly running around. As the ferry got closer to the docks, Solvitus could see more clearly what was going on. 
This man scuffled through the piles of paper, searching for something. Ancient Scrolls of parchment and old tablets were scattered through the ruined tower. A coin of gold here and a small pouch there, he gathered all up. Solvitus, thinking out lood, asked what the man was doing, but death had already left the ferry. 
</p>


<p>The man sorted some of his papers and scrolls on a small pile. His time was short, trying to gather as many of his belongings before he had to go. The wind carried the words of death with it. “My ferry awaits thee.” Cold drops of sweat drew lines over the face of the man as he stuffed his bag with the coins, putting one in his pocket. “Come now” the shadows darkened as the voice spoke again. Tuffing the pile of scrolls in his bag, the man saw the tips of his fingers slowly turning a smokey, translucent pale green. “Croesus, thine time is now.” Looking over his shoulder while sprinting out of the ruins, the man’s gaze flew through the room, in search of important scrolls. On his left, he saw a small wooden box, reaching over, he saw his hand slowly disappear into the fog, he barely felt his fingers fold around the small container, as he ran on. He did not have time to stop, as he crumpled all the scrolls while stuffing this tiny box deep within his bag. He ran over the cold soggy ground, toward the dock. 
</p>

<p>As he ran up the dock, he saw it, emerging from the thick grey fog. Standing on the edge was the figure of death, dressed in an elegant robe. From his belt hung an hourglass and a tome, binding thousands of sheets of papyrus together. Solvitus saw how the man stopped in his tracks, presenting a single golden coin to Death. “Croesus, Time in the realm of experience has ended for thee. Come now and step forward, for I await thy presence. The hourglass ticks, before it is empty, thine future will be determined."
Left behind
Death steered the ferry across the lake, carefully steering it around the rocks, jutting up from underneath the waves. Solvitus gazed into the endless, pitch black depths of the lake. Wondering if someone had ever jumped into the frigid waters to escape their fate. They are all dead, so what is the worst that could…. His thoughts were interrupted before he could finish them. Aslaug’s rhythmic ticking had stopped. As Zenna, the elderly woman was struggling to get up, leaning on the walking stick her grandson had found for her. She slowly shuffled across the isle, on her way towards Aslaug.  “What is wrong dear?” Her voice was shaky, but warm and calming. A welcome contrast to the cold air. The clouds from her breath mingled with the fog. Aslaug looked up at the woman, her shaking seemed to have stopped. She pointed at the streak across her throat. It already looked like a scar. “My death, my one chance, has been in vain.” She paused for a moment, looking up at death. “Have you seen the ghosts on the islands Zenna? I would be happy to end up like one of them. But I’ll probably be taken beyond the gates, to an even worse fate.” Solvitus could not help but feel bad for Aslaug. A shame that she could not be helped. Zenna smiled, about to open her mouth, but was abruptly thrown off balance as the king Aristarchus rose from his bench, grabbing her arm leaning on her walking stick to hoist himself up. “Oh, petty on you Aslaug” He spoke. 
</p>

<p>
  Solvitus was taken aback by the brashness of this man. The king raised his voice again: “Yes, we all lost something. You did not die as a glorious warrior. But me, I had it all!”The volume of his voice rose with each sentence” A palace, a wondrous banquet each evening. Men and women of all standings would crawl at my feet begging for my generosity!” “But now, I am stuck with you lot.” The tirade was interrupted by a calm, cold and raspy voice. “I suggest to thee to make peace with thine current state, king of mortals. Learn from how thee treated others in life. For in death, thy art no ruler.” Solvitus, who stood in between death and the king, stepped forward. “Aristarchus, please, sit. We are not the ones who have taken your kingdom.” “You are right,” the king replied. “That thing took it!” His voice raised once more. “Death took my kingdom, it took your honour, it has taken so much from all of us!” Aristarchus started moving through the boat, brushing up against the elderly woman. His gaze focused on death. Solvitus took a step towards the aisle in between the benches, blocking the king’s path. “Step aside subject!” the king bellowed, whilst raising his fist. Solvitus tried to keep his voice steady, as to not betray his fears  “Quit your petty cries! This is not helping anyone!” Solvitus hesitated for a second, but eventually took another step forward, placing himself firmly between the ferryman and the king. “Why would you need gold and riches in the afterlife? Everything, everyone that matters is waiting on us.” Aristarchus lunged forward, and with a wide arc, he swung his fist towards Solvitus. He braced for the inevitable pain, closing his eyes and gritting his teeth. In all his years, he had never been in a fight, but somehow now he was. 
The fist never connected to his jaw, as a wind passed his face. Had the king missed his swing? Solvitus pried one eye open. Wondering how, what happened. What he saw in front of him was the vague form of the king, slowly being taken away by the fog. Pale green mist flowing away, his face becoming more and more transparent. The raspy voice of Death penetrated the silence. “A shame.” Solvitus turned around, he saw the hood hanging, death’s head bent down to the floorboards. Unable to meet his gaze, Solvitus followed the vague silhouette of the king, now floating just above the water. The boat sailed away, leaving the king behind, without a kingdom, without an afterlife. Solvitus’ heart was filled with pain and sadness, to see someone abandoned by… themselves? A sudden jolt of fear burst through his chest. 

</p>


<p>Turning his gaze away from the ghost, Solvitus focussed on the horizon. There, in the depths of the cold fog, stood a monolithic structure. Its dark silhouette pierced through the grey veils. Dooming far above the islands of the lake, was the gate to the afterlife. 
</p>


<p>
  He was startled by a hand on his shoulder. As he turned around and followed the arc of the arm, he saw Death looking down at him. “My thanks go out to thee, one does not need to involve themselves with the issues on my boat. However, thee still went out of thine way.” 
Solvitus looked away from death, onto the gate on the horizon. He hesitated for a second, before speaking. “You did not take his Kingdom, he probably doomed himself years ago. By the mistakes of his life.” “There is truth in thine words, but mistake not, a path through the veil will be revealed to those who seek it, But once thee stops searching, thee will be stuck upon the lake.” The waters in this part of the lake became more and more restless. Dragging the ship closer to the shores and the rocks jutting out from the waves. 
“Now cometh with me, for we continue our path towards the gate. Once we are past these treacherous waters, we should arrive within no time.” 

</p>


<p>Aslaug had already helped Zenna back to her bench. She clutched the kane tightly, still shaking from the ordeal with Aristarchus. Aslaug’s hands were shaking as the panic in her voice grew. “I can’t! I can’t end up like him!” She exclaimed. The mighty warrior collapsed onto the floorboards of the ferry. Solvitus slowly walked over to her, his hand stretching out to grasp her shoulder. “You won’t” He spoke, pausing, waiting for Aslaug to meet his eyes. “You have lived to the fullest! Didn’t Death just speak of how many boats he had ferried over this lake in your name?” Aslaug seemed to calm down, but her eyes. Big, sad and bloodshot gave away the thoughts hidden deep within her head. With a calm voice, Croesus spoke up, possibly wanting to soothe Aslaug’s fears. “Prowess is not all… I know that I for one will be able to pass the gate. For I have gathered knowledge and wealth in my life. Didn’t you?” 
Solvitus looked as Aslaug. Who seemed even more distressed after Croesus’ comment. Solvitus felt a cold grip on his heart as the woman teared up. So he continued “If you were to end up like him, you would have already done so…” Solvitus did not know if this was true, but at least it gave himself some peace, maybe it did the same for his companion? “How do you know?” Aslaug’s voice was trembling as the question rolled over her lips. There was a short silence.
Solvitus hesitated for a second. Doubting if he should show his own vulnerability. He had to hold back his words, pressing the tip of his tongue up against his palate. But before he knew, the thought escaped his grasp. It wanted to come out for some reason. “I know, because even I, I am still here…” As the words left his lips, a panic took over. He heard Croesus once more trying to comfort Aslaug, who in turn sounded irritated. But all of their infighting was consumed by the unrest of his mind. Sound became muffled, inaudible. The air, still and foul within his nostrils. Even his tongue, which had so recently betrayed him, felt dry and itchy. The outside world became a blur of colour and sound. The shouting match at the front of the ferry was consumed by the fog. As he stumbled towards the back of the ferry, staring out onto the lake. As he stood next to death, Solvitus did not know if it was so, but it felt like hours passed by in silence. 
</p>

<p>Death’s gaze burned into the back of Solvitus’ skull. He did not look at it. But in the waves of the lake, surrounded by shadows and hidden deep within the shadows, the white glint of its black eyes was unmistakable. They seemed to invite him, and seemed to want him to step away from the group. It felt as if they were alone. Solvitus still heard the fight, somewhere? Softly echoing in the distance. Death’s deep voice spoke “I am wondering, why hast thou chosen to involve thineself with the issues of others Solvitus?” Solvitus hesitated. Even after so long, the deathly figure still intimidated him. “You told us that the gates are the final moment. They are not ready! We need to help them before it is too late. We can’t leave them behind!” Solvitus thought that if he could fool himself, Death would also believe him.
Death seemed intrigued “But why hast thou taken this burden upon thine self? Will thee help them all?” Death’s voice was eerily calm, there was no emotion, no excitement, nothing to be read from it. Solvitus looked up at it. The hourglass on his belt was slowly draining away. Time was slipping. Solvitus was desperately tying to gain some form of connection with the being, while he spoke. “You have been watching us… You know exactly why.” Death nodded. For Solvitus, the following seconds could have been an eternity, as Death’s eyes seemed to pierce his own. Diggin deeply within him, laying him bare before the master of this realm. It said “Thee will make the right decision.” Before Solvitus could react, the darkness seemed to pull back while the shiny eyes closed. Disappearing into nothing. The waves returned from the blackness as light seemed to return back to the world. 
</p>


<p>
He heard Aslaug's voice ring out once more.  To his surprise, Aslaug was still finishing up the same sentence as when he had left the group. It was as if no time had passed. As if he had never had the conversation with Death. But still, the hourglass pressed on. Their time was limited, ever shortening. 
Standing at the back of the ferry, he looked at Aslaug, the anger trembling through her body. Her face was inches away from the man. His face was seething with anger, but his torso was turned away from her. He was cradling his bag in his arms. Caring for his valuables within as if it was his child. 
Lifting one hand from the bag, he gave a stern push against the warriors shoulder. She however, did not budge, her feet planted firmly on the floor. So, Croesus did not push her, instead he threw off his own balance. It would have been funny, had it not been followed by his icy scream. While he lost his balance, his bag had tipped, it’s contents spilling out. Coins bouncing and rolling off the edge of the boat. Scrolls unfurled and scattered all around. Valuables fell into the lake. The waves grasping at them, dragging them deeper into the darkness.  Croesus was scrambling to gather as many of his belongings as possible. His hands, turning a pale, green, darted between the items on the floor and those falling over the edge. When Aslaug tried to help him, he merely sneered at her. Telling her to keep her hands away from his property.
Solvitus was slowly making his way to the front of the boat, wanting to help the man, halted, startled by Croesus’ hostility. Seeking guidance from Death, Solvitus saw only sorrow in its small eyes. 
Croerus rose to stand up, trying to save a scroll hanging over the edge. It was slowly soaking itself within the waters. He lunged his body towards his property, but his hands never made contact with the scroll. It fell over the edge, as the man’s figure dissolved. Being whisked away by the fog. Hovering in place, flailing his arms. Trying in vain to recover his lost valuables. The spectre, that was once Croesus, passed by only inches away from Solvitus. As the ferry made its way through the lake. 

</p>

<h3>The kane
</h3>
<p>Making his way  to the front of the ferry, Solvitus looked back at the lake. His gaze fell over Croesus, his arms cradled an empty nothingness close to his chest. Not paying attention, his feet betrayed him. As the boat was rocked by the waves he lost his footing. Stumbling back to his balance, Solvitus’ saw the woman in the front, her newborn laying still within her arms. She hadn’t spoken yet, Solvitus did not expect her to. He remembered his own silence, after his son had passed. He wanted to console her, wanted to help her with the pain. So that the grief would not consume her, like it did himself. 
He moved in silence, looking out over the misty lake. He stopped, just behind Zenna, as the kane in her arms blocked his path. She didn’t seem to notice that he wanted to pass. Zenna smiled while looking at the kane, she looked up at him, her smile was warm, and disarming to Solvitus. “You know, my grandson gave it to me.” 
</p>

<p>Solvitus smiled back at her. Doing so, he was reminded of distant memories of family. Those that he had not lost, were driven away by him. At the time, it was his way to deal with his own grief. 
There was a slight pause, Solvitus hesitated to share his own thoughts. “My son was a carpenter, just like my father.” Solvitus’ voice trembled while he spoke these words. He had never spoken about his son in life. He continued ”When my father became old, they decided to craft a cane for him together. I wish I would have helped them back then. But I told myself that I was too busy with the farm.” His smile slowly faded. Zenna asked him “How did it turn out?” her loving eyes were filled with curiosity. Solvitus had to swallow before speaking once more “It never did… Makarios fell ill before they could finish it.” Once more, his eyes stung with grief. “My father never got to use it. Together, we placed the unfinished kane in my son's grave…” My father passed away a few winters later. 
A wrinkly hand folded itself around his own. As her soothing voice spoke out once more “Soon, When you meet them again, you’ll get to finish it.” He dried his eyes with the back of his hand using it as an excuse to muffle his words. “I am not so sure. I am not sure if any of us will be ready for what is to come.” Solvitus spoke as his gaze was fixed on the gate, looming on the horizon. 
He turned around, ready to walk back to the end of the boat, to take his station next to death. His shoulders hung in a downward angle. While his feet dragged him over the slightly wet, wooden boards. He watched the waves of the lake crash up against the rocks, how they reflected the light of the lantern, how they mirrored the colours of the sky, refracting them into a million different colours.  The waves of the lake had a hypnotic power over him. These colours were dragged down into the depths of the lake, Solvitus did not know that there were so many subtle differences within the pitch black nothingness. But there, at the centre of it all, buried deep within the darkness, was something far more dark than any shade of black. It was a  small house. Once upon a time, he would have called it a home. But that sentiment had long since passed. Ripped away from him by Death, by death? ….by life? 
His mind wandered toward the small farmhouse located on the hill, its ruined walls made from evenly stacked stones, with small pebbles filling the empty space in between. The front of the house was fenced off, with small plants crawling upwards to the finely crafted woodwork. The left side of the house was hugged by a large open shed, which held the carcass of an old woodworking shop within. It seemed to be destroyed, as if a storm had raged in between the walls. 
Deep shadows hugged the walls, and a musky, moist scent filled the air. Solvitus walked across the cobblestone path that he and his father had laid when he was just a boy. The path led him towards the front door, but he never reached it. Instead his feet took him onward, towards the back of the house. There, in between the old ferns, was the tombstone belonging to Makarios.
With trembling knees, Solvitus stumbled towards the stone, while being fairly well kept, its age was already showing. The years had not been kind to it, but nature mended the cracked stone with soft mosses and lichen. His hands were able to catch the edge of the tombstone while he collapsed into a pile of despair. His back contorting while his fingernails dug themselves into the ground below him. His cheeks were wet with tears, cold streams travelling down like rivers through a landscape. He felt the muscles of his jaws contort and contract. Opening his mouth for a soundless scream of agony. The only thing that left his lips were thick globs of saliva. Solvitus lifted his head as he was finally able to let out a high pitched shriek. 
</p>


<p>He was ripped from his dreams by a sudden coldness clinging over his body. It was gripped by a dark winter that had suddenly fallen. If only it had been winter, if only it had been a black abyss of nothing. No, for him, there was no respite, no easing the pain, no delay of the inevitable. The cold hailed from the gripping shadows of the gate. 
</p>

<p>Zenna’s voice was far more shaky than her usual soft spoken tone. Solvitus looked at her, his words held back by the grief buried in the depths of his memories. He was silent for what seemed like hours. “We all need more time with each other.” Solvitus’ stare was fixed upon the great gate in the distance. As the boat came closer by the second, Zenna sighed “if only we had more time.”
</p>
<p>The frigid air clung to their faces, caressing their cheeks as the boat carved its way through the fog. It was like the fog was dancing around them, tendrils of grey floating about. Swaying in the rhythm of the winds. The fog was filled with presence, things flowing through the wind. Solvitus felt like fog was grasping at him, trying to lure him into the waters,  trying to pull him away from the gate. Hours, maybe days of silence passed by, or were it minutes? Solvitus’ grasp of time was slipping as he stared into the waves, dancing in complex patterns around the ferry, like the flames of a fire licking the logs that give it life. Reflections of clouds, auroras and a starless sky passed through the waves, being enveloped into the black nothingness underneath. Solvitus wanted to shiver, to cry, to run. He Just wanted a way, any way to release himself from this moment.
</p>


<h3>The gate
</h3>

<p>The fog became heavier, it seemed to dance as the waves beneath it pushed and pulled on the surface of the water. The cold waters gripped onto the ferry like the tendrils of a great sea beast. Dragging it ever closer towards the monolithic gate, as it doomed over the landscape, casting shadows of cold and darkness. It was now that the gate was only barely obscured by fog. Solvitus could barely hold back the feeling of dread. 
It wasn’t just the architecture of the thing, strange and wicked. Perfectly rectangular, its form was simple and hulking. The bricks of an unknown stone were massive, far larger than their small boat. But it wasn’t just the form of the thing, and not only what it held, for in the centre of the gate, floated a cube, one of an ornate metal. Its surface held runes and inscriptions, which were almost twice the size of a grown man. It was an eerie thing. It brought fear and dread to Solvitus. Though, that is what he let himself to believe, that this unnatural artifact, and the silhouette of the great gate was the source of his anxiety. The small boat was filled with dread, as the shadow of the gates overtook it. Solvtius stood at the very back, next to death himself. Seeing the rest of his companions sit on their benches. In the centre of the boat, there was one more bench. It had been empty this entire journey. 
</p>
<p>“Croesus and Aristarchus will never reach beyond will they?” Solvtius asked Death. It simply replied with a short but firm “Indeed, they whom had never found their peace”. Solvitus continued “Do you think I’ll end up as one of them?” Death seemed surprised, as it spoke “It art not up to me, Thee be the only one, whom may make it cometh to pass”. Solvtius clutched the small pouch hanging from his belt. He took a letter from the pouch. With a shaking hand, he held it up to the deathly figure. His voice was shaking as he spoke “If I don’t…. If I do not end up on the other side, would you please pass this on to Makarios?”
“Why does thou feel that thee cannot pass on?” Solvitus was ready for this question. “Because Makarios was not the only one who had died that day.” He continued. “I have been stuck on that day, Like how Aristarchus and Croesus were stuck in their life.” Death was silent for a moment. Solvitus stared at the empty bench, the one he could have sat upon. He capitalised on the silence, blurting out all his thoughts, as it would be now, or never. “I am not ready yet! I am not ready to face him….” Death’s eyes seemed sad, even more than usual, as it just listened to Solvitus talk. “I can’t face my own son…. I have wasted my life, something he never even had the chance to do! I have squandered my gift…”
</p>

<p>He hadn’t noticed, Death seemed different. An old man, with a long unkept beard stood in its place. With large eyes filled with sorrow, pain and pity. Death’s frail form leaned on the old oar it had used to steer the ferry towards their destination.  Death leaned forward, bringing himself closer to Solvitus. Its hands stretched out, opening its palms towards Solvitus, accepting the letter as it spoke. “Indeed, thee thinks thou art the same as them…” 
It looked deep into Solvitus’ being, like it was laying his mind bare before them. “Thou art the different side to the same coin as them. The same, in some regard, but vastly different in thine heart. Thou did come here with shame, fueled by thineself. As did they.” Death seemed to take its time, as the last grains of sand fell down in its hourglass. It continued to speak. “Those who have left themselves never let go of their shame, never found their peace…” As death spoke its words, It removed the hourglass from its belt, holding it out to Solvitus. “Thee haveth found thine peace, thee just need the time to accept it.” 
Solvitus’ Took a look around the ferry, he saw his companions, Aslaug, Zenna, the mother and her child, and Solos. He saw Death, presenting the hourglass, the empty bench and finally Death. “The hourglass was never meant for us, was it?” Death just smiled at him. “Will it be enough?” He exclaimed as he took the hourglass from the cold grasp. 
</p>
<p>The old man’s frail form stumbled over the ferry, taking a seat on the empty bench. Within the man’s grasp was a small letter. Ment for the son of a friend. Solvitus took his place while a cloak wreathed in midnight formed around his shoulders. And with a firm grip, he took the oar. There stood Solvitus, a new ferryman and he paddled softly through the calm clear waters of the lake. Steering his ferry towards the ancient gate.
</p>

<p>“Maybe there is no such thing as a perfect life.”
</p>
<p>- Solvitus</p>
